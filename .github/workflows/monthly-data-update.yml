name: Monthly K-Collusion Data Update

on:
  schedule:
    # monthly: 15th day 06:00 UTC
    - cron: '0 6 15 * *'
  workflow_dispatch: {}

jobs:
  update-data:
    name: Regenerate and commit data (monthly)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pandasdmx requests

      - name: Run data generation script
        id: gen
        run: |
          set -e
          echo "Running python/generate_data.py"
          python python/generate_data.py --require-live

      - name: Check for changes
        id: check
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          # Ensure file exists
          if [ ! -f public/data/k-collusion-index.json ]; then echo "ERROR: generated file missing"; exit 1; fi
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            git commit -m "chore(data): automatic update of k-collusion-index.json [skip ci]" || true
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push changes (if any)
        if: steps.check.outputs.changed == 'true'
        run: |
          set -e
          echo "Pushing committed changes back to the default branch"
          git push origin HEAD:${{ github.ref_name }}

      - name: Optional smoke test of Pages URL
        env:
          PAGES_URL: ${{ secrets.PAGES_URL }}
        run: |
          set -e
          if [ -z "$PAGES_URL" ]; then
            echo "PAGES_URL not set, skipping smoke test"
            exit 0
          fi
          echo "Running smoke test against $PAGES_URL"
          ATTEMPTS=3
          SLEEP=10
          SUCCESS=0
          for i in $(seq 1 $ATTEMPTS); do
            echo "Attempt $i/$ATTEMPTS: fetching $PAGES_URL/data/k-collusion-index.json"
            if curl -fsS "$PAGES_URL/data/k-collusion-index.json" -o /tmp/k-collusion-index.json; then
              if [ -s /tmp/k-collusion-index.json ]; then
                python -c "import sys,json; json.load(open('/tmp/k-collusion-index.json'))" && SUCCESS=1 && break || true
              fi
            fi
            echo "Attempt $i failed, sleeping $SLEEP seconds..."
            sleep $SLEEP
          done
          if [ "$SUCCESS" -ne 1 ]; then
            echo "Smoke test failed after $ATTEMPTS attempts"; exit 1
          fi

      - name: Final status
        run: |
          if [ "${{ steps.check.outputs.changed }}" = 'true' ]; then echo "Committed and pushed updated data file"; else echo "No changes - nothing to commit"; fi
